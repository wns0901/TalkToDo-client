server {
    listen 80;
    server_name localhost;
    return 301 https://$server_name$request_uri;  # HTTP를 HTTPS로 리다이렉트
}

server {
    listen 443 ssl http2;
    server_name localhost;

    # SSL 인증서 설정 (환경변수 또는 기본 경로)
    ssl_certificate ${SSL_CERT_PATH:-/etc/nginx/ssl/certificate.crt};
    ssl_certificate_key ${SSL_KEY_PATH:-/etc/nginx/ssl/private.key};
    ssl_trusted_certificate ${SSL_CA_PATH:-/etc/nginx/ssl/ca_bundle.crt};

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS 헤더 추가
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}