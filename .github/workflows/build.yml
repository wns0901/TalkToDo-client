name: Deploy to EC2

on:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v1

      - name: DockerHub 로그인
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build, push Docker image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: wns0901/crew-dock-client:latest
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
          secrets: |
            "ssl_cert=${{ secrets.SSL_CERT }}"
            "ssl_key=${{ secrets.SSL_KEY }}"
            "ssl_ca=${{ secrets.SSL_CA }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Docker 설치 여부 확인 및 설치
            if ! command -v docker &> /dev/null
            then
              echo "Docker가 설치되어 있지 않습니다. 설치를 진행합니다."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            else
              echo "Docker가 이미 설치되어 있습니다."
            fi

            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            sudo docker stop $(sudo docker ps -aq) 2>/dev/null || true
            sudo docker rm $(sudo docker ps -aq) 2>/dev/null || true
            sudo docker pull wns0901/crew-dock-client:latest
            sudo docker run -d -p 80:80 -p 443:443 --name crew-dock-client wns0901/crew-dock-client:latest

            # 디버깅: 컨테이너 상태 확인
            echo "=== 컨테이너 상태 확인 ==="
            sudo docker ps -a
            echo "=== 컨테이너 로그 확인 ==="
            sudo docker logs crew-dock-client
            echo "=== 포트 확인 ==="
            sudo netstat -tlnp | grep :80
            sudo netstat -tlnp | grep :443
            echo "=== SSL 인증서 확인 ==="
            sudo docker exec crew-dock-client ls -la /etc/nginx/ssl/
            echo "=== Nginx 설정 확인 ==="
            sudo docker exec crew-dock-client nginx -t
